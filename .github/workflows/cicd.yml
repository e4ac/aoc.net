name: CICD
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v[0-9]+\.[0-9]+\.[0-9]+']
  workflow_dispatch:

jobs:
  analysis:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Check Format
      run: dotnet format --verify-no-changes

  test:
    name: Test
    needs: [analysis]
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Test
      run: dotnet test --verbosity normal

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish Package
    needs: [test]
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          dotnet pack -c Release -o ./artifacts -p:PackageVersion="$VERSION"
      - name: Push Package
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
